  <path d="M74 68 Q74 38 100 36 Q126 38 126 68 Q126 48 110 42 Q90 38 74 52 Z" fill="#1a1a2e"/>
  <path d="M78 45 Q90 35 105 40" fill="#2a2a3e" opacity="0.7"/>
