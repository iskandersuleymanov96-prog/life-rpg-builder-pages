  <path d="M80 65 L95 65 Q97 65 97 67 L97 72 Q97 74 95 74 L80 74 Q78 74 78 72 L78 67 Q78 65 80 65" fill="#1a1a2e" opacity="0.9"/>
  <path d="M105 65 L120 65 Q122 65 122 67 L122 72 Q122 74 120 74 L105 74 Q103 74 103 72 L103 67 Q103 65 105 65" fill="#1a1a2e" opacity="0.9"/>
  <line x1="97" y1="69" x2="103" y2="69" stroke="#1a1a2e" stroke-width="1.5"/>
  <!-- Reflection -->
  <line x1="82" y1="68" x2="88" y2="68" stroke="#fbbf24" stroke-width="0.5" opacity="0.4"/>
  <line x1="107" y1="68" x2="113" y2="68" stroke="#fbbf24" stroke-width="0.5" opacity="0.4"/>
  <!-- Confident smirk -->
  <path d="M92 82 Q100 88 108 82" fill="none" stroke="#8a6a4a" stroke-width="1.5" stroke-linecap="round"/>
