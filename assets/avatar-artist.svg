  <circle cx="100" cy="108" r="3" fill="#fbbf24" opacity="0.7"/>
  <!-- Stage lights -->
  <circle cx="50" cy="50" r="3" fill="#fbbf24" opacity="0.2"/>
  <circle cx="150" cy="60" r="2" fill="#fbbf24" opacity="0.15"/>
  <circle cx="140" cy="45" r="2.5" fill="#fbbf24" opacity="0.25"/>
