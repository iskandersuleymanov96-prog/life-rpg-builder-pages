<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#280a0a"/>
      <stop offset="100%" style="stop-color:#4a1a1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6f;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="armor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1a1a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)" stroke="#ff6b6f" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#glow)" stroke-width="0.5"/>
  <!-- Body/Armor -->
  <path d="M65 180 L65 120 Q65 100 85 95 L100 90 L115 95 Q135 100 135 120 L135 180" fill="url(#armor)"/>
  <!-- Shoulder pads -->
  <ellipse cx="60" cy="120" rx="18" ry="12" fill="#4a2a2a" stroke="#ff6b6f" stroke-width="1" stroke-opacity="0.5"/>
  <ellipse cx="140" cy="120" rx="18" ry="12" fill="#4a2a2a" stroke="#ff6b6f" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Chest plate -->
  <path d="M80 110 L100 105 L120 110 L115 140 L100 145 L85 140 Z" fill="#2a1515" stroke="#ff6b6f" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Head -->
  <circle cx="100" cy="70" r="27" fill="#d4a574"/>
  <!-- Short warrior hair -->
  <path d="M73 65 Q73 40 100 38 Q127 40 127 65 Q127 50 100 48 Q73 50 73 65" fill="#1a0a0a"/>
  <!-- Scar -->
  <line x1="85" y1="62" x2="80" y2="75" stroke="#8a4a2a" stroke-width="1.5" opacity="0.6"/>
  <!-- Eyes (determined) -->
  <ellipse cx="90" cy="68" rx="4" ry="3.5" fill="#1a1a1a"/>
  <ellipse cx="110" cy="68" rx="4" ry="3.5" fill="#1a1a1a"/>
  <circle cx="91" cy="67" r="1.2" fill="white" opacity="0.9"/>
  <circle cx="111" cy="67" r="1.2" fill="white" opacity="0.9"/>
  <!-- Serious mouth -->
  <line x1="92" y1="82" x2="108" y2="82" stroke="#6a4a2a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Sword -->
  <line x1="150" y1="90" x2="170" y2="60" stroke="#c0c0c0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="145" y1="95" x2="155" y2="85" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
  <!-- Energy aura -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#ff6b6f" stroke-width="0.5" opacity="0.2"/>
</svg>
