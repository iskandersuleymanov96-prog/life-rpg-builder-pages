  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)" stroke="#a98bff" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#glow)" stroke-width="0.5"/>
