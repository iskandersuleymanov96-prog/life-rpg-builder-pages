<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#aeb8c4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="suit" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3e"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="95" fill="url(#bg)" stroke="#aeb8c4" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#glow)" stroke-width="0.5"/>
  <!-- Futuristic suit -->
  <path d="M65 180 L65 120 Q65 100 85 95 L100 90 L115 95 Q135 100 135 120 L135 180" fill="url(#suit)"/>
  <!-- Tech lines on suit -->
  <line x1="75" y1="120" x2="75" y2="170" stroke="#aeb8c4" stroke-width="0.5" opacity="0.3"/>
  <line x1="125" y1="120" x2="125" y2="170" stroke="#aeb8c4" stroke-width="0.5" opacity="0.3"/>
  <!-- Chest glow -->
  <circle cx="100" cy="125" r="8" fill="#aeb8c4" opacity="0.1"/>
  <circle cx="100" cy="125" r="4" fill="#aeb8c4" opacity="0.2"/>
  <!-- Head -->
  <circle cx="100" cy="70" r="26" fill="#d4b896"/>
  <!-- Neutral hair -->
  <path d="M74 65 Q74 42 100 40 Q126 42 126 65 Q126 52 100 50 Q74 52 74 65" fill="#3a3a4a"/>
  <!-- Eyes (neutral) -->
  <ellipse cx="90" cy="68" rx="3.5" ry="3" fill="#2a2a3e"/>
  <ellipse cx="110" cy="68" rx="3.5" ry="3" fill="#2a2a3e"/>
  <circle cx="91" cy="67" r="1" fill="white" opacity="0.7"/>
  <circle cx="111" cy="67" r="1" fill="white" opacity="0.7"/>
  <!-- Neutral expression -->
  <line x1="93" y1="82" x2="107" y2="82" stroke="#8a7a6a" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Floating geometric shapes -->
  <polygon points="150,60 155,70 145,70" fill="none" stroke="#aeb8c4" stroke-width="0.8" opacity="0.4"/>
  <rect x="145" y="85" width="10" height="10" fill="none" stroke="#aeb8c4" stroke-width="0.8" opacity="0.3" transform="rotate(45 150 90)"/>
  <circle cx="155" cy="105" r="5" fill="none" stroke="#aeb8c4" stroke-width="0.8" opacity="0.35"/>
  <!-- Question mark symbol -->
  <text x="100" y="95" font-family="monospace" font-size="16" fill="#aeb8c4" text-anchor="middle" opacity="0.4">?</text>
</svg>
